<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Your Email</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #f3f3f3;
            font-family: Arial, sans-serif;
        }
        .auth-logo {
            text-align: center;
            margin: 2rem 0 1rem;
            font-size: 2rem;
            font-weight: 800;
            color: #131921;
        }
        .auth-logo span { color: #ff9900; }
        .auth-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            text-align: center;
        }
        .auth-card h4 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #131921;
        }
        .auth-card p {
            font-size: 0.9rem;
            color: #767676;
        }
        .auth-card a {
            color: #0066c0;
            text-decoration: none;
            font-size: 0.85rem;
        }
        .auth-card a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-logo">My<span>Shop</span></div>
    <div class="auth-card">
        <h4>Check Your Email</h4>
        <p>We've sent password reset instructions to your email if an account exists with that address.</p>
        <a href="{% url 'login' %}">Back to Sign in</a>
    </div>
</body>
</html>
