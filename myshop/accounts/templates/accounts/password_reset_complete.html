<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Reset Complete</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: #f3f3f3;
            font-family: Arial, sans-serif;
        }
        .auth-logo {
            text-align: center;
            margin: 2rem 0 1rem;
            font-size: 2rem;
            font-weight: 800;
            color: #131921;
        }
        .auth-logo span { color: #ff9900; }
        .auth-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 2rem;
            width: 100%;
            max-width: 380px;
            margin: 0 auto;
            text-align: center;
        }
        .auth-card h4 {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #131921;
        }
        .auth-card p {
            font-size: 0.9rem;
            color: #767676;
            margin-bottom: 1rem;
        }
        .auth-btn {
            display: inline-block;
            padding: 0.5rem 1.5rem;
            background-color: #ffd814;
            border: 1px solid #fcd200;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #131921;
            text-decoration: none;
        }
        .auth-btn:hover { background-color: #f7ca00; }
    </style>
</head>
<body>
    <div class="auth-logo">My<span>Shop</span></div>
    <div class="auth-card">
        <h4>Password Reset Complete</h4>
        <p>Your password has been reset successfully. You can now sign in with your new password.</p>
        <a href="{% url 'login' %}" class="auth-btn">Sign In</a>
    </div>
</body>
</html>
